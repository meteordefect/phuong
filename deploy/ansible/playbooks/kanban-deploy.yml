---
- name: Deploy Kanban Fork (Phoung v5)
  hosts: control_plane
  become: yes

  vars:
    kanban_install_dir: /opt/kanban
    kanban_repo_dir: /opt/kanban/kanban
    kanban_env_file: /opt/kanban/.env
    kanban_port: 3484
    node_major_version: 22

  tasks:
    # --- Node.js ---

    - name: Check if Node.js is installed
      shell: node --version 2>/dev/null || echo "missing"
      register: node_check
      changed_when: false

    - name: Install Node.js {{ node_major_version }} (if missing)
      when: node_check.stdout == "missing"
      block:
        - name: Add NodeSource GPG key
          shell: curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
          args:
            creates: /etc/apt/keyrings/nodesource.gpg

        - name: Add NodeSource repository
          apt_repository:
            repo: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ node_major_version }}.x nodistro main"
            filename: nodesource
            state: present

        - name: Install Node.js
          apt:
            name: nodejs
            state: present
            update_cache: yes

    # --- Project directory ---

    - name: Create install directory
      file:
        path: "{{ kanban_install_dir }}"
        state: directory
        mode: '0755'

    # --- Sync source code ---

    - name: Sync Kanban source to server
      synchronize:
        src: "{{ playbook_dir }}/../../../kanban/"
        dest: "{{ kanban_repo_dir }}/"
        delete: yes
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=dist"
          - "--exclude=web-ui/node_modules"
          - "--exclude=web-ui/dist"
          - "--exclude=.git"

    # --- Environment file ---

    - name: Copy .env to server
      copy:
        src: "{{ playbook_dir }}/../../../.env"
        dest: "{{ kanban_env_file }}"
        mode: '0600'

    # --- Build ---

    - name: Install Kanban dependencies
      shell: npm install --ignore-scripts && npm run install:all
      args:
        chdir: "{{ kanban_repo_dir }}"

    - name: Build Kanban (server + web-ui)
      shell: set -a && . {{ kanban_env_file }} && set +a && npm run build
      args:
        chdir: "{{ kanban_repo_dir }}"
      notify: Restart Kanban

    # --- Pi coding agent ---

    - name: Check if pi is installed
      shell: which pi 2>/dev/null || echo "missing"
      register: pi_check
      changed_when: false

    - name: Install pi coding agent globally
      shell: npm install -g @mariozechner/pi-coding-agent
      when: pi_check.stdout == "missing"

    - name: Set pi as default Kanban agent
      copy:
        content: '{"selectedAgentId":"pi"}'
        dest: /root/.cline/kanban/config.json
        force: false
        mode: '0644'

    # --- Systemd service ---

    - name: Install Kanban systemd service
      template:
        src: ../templates/kanban.service.j2
        dest: /etc/systemd/system/kanban.service
        mode: '0644'
      notify: Restart Kanban

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable and start Kanban service
      systemd:
        name: kanban
        state: started
        enabled: yes

    # --- Nginx ---

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Install Kanban nginx config
      template:
        src: ../templates/kanban-nginx.conf.j2
        dest: /etc/nginx/sites-available/kanban
        mode: '0644'
      notify: Reload Nginx

    - name: Enable Kanban nginx site
      file:
        src: /etc/nginx/sites-available/kanban
        dest: /etc/nginx/sites-enabled/kanban
        state: link
      notify: Reload Nginx

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload Nginx

    - name: Remove old Phoung nginx site (if present)
      file:
        path: /etc/nginx/sites-enabled/phoung
        state: absent
      notify: Reload Nginx

    # --- TLS ---

    - name: Install Certbot
      apt:
        name:
          - certbot
          - python3-certbot-nginx
        state: present
      when: domain | length > 0

    - name: Create certbot webroot
      file:
        path: /var/www/certbot
        state: directory
        mode: '0755'
      when: domain | length > 0

    - name: Check if SSL cert exists
      stat:
        path: "{{ ssl_cert_path }}/fullchain.pem"
      register: ssl_cert_stat
      when: domain | length > 0

    - name: Generate self-signed cert (placeholder until certbot runs)
      shell: >
        mkdir -p {{ ssl_cert_path }} &&
        openssl req -x509 -nodes -days 365 -newkey rsa:2048
        -keyout {{ ssl_cert_path }}/privkey.pem
        -out {{ ssl_cert_path }}/fullchain.pem
        -subj '/CN={{ domain }}'
      when: domain | length > 0 and (not ssl_cert_stat.stat.exists | default(false))

    - name: Restart nginx after cert setup
      systemd:
        name: nginx
        state: restarted
      when: domain | length > 0

    - name: Obtain Let's Encrypt certificate
      shell: >
        certbot certonly --webroot
        --webroot-path /var/www/certbot
        --email "admin@{{ domain }}"
        --agree-tos
        --non-interactive
        -d "{{ domain }}"
      register: certbot_result
      failed_when: false
      changed_when: certbot_result.rc == 0
      when: domain | length > 0

    - name: Reload nginx after real cert
      systemd:
        name: nginx
        state: reloaded
      when: domain | length > 0 and certbot_result.rc | default(1) == 0

    - name: Set up SSL renewal cron
      cron:
        name: "Renew SSL certificate"
        job: "certbot renew --quiet --post-hook 'systemctl reload nginx'"
        hour: "3"
        minute: "0"
        user: root
        state: present
      when: domain | length > 0

    # --- Firewall ---

    - name: Allow SSH
      ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: Allow HTTP
      ufw:
        rule: allow
        port: '80'
        proto: tcp

    - name: Allow HTTPS
      ufw:
        rule: allow
        port: '443'
        proto: tcp

    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny

  handlers:
    - name: Restart Kanban
      systemd:
        name: kanban
        state: restarted

    - name: Reload Nginx
      systemd:
        name: nginx
        state: reloaded
