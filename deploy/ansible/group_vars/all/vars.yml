---
# Phuong v3 Ansible Variables

# Project settings
project_name: phuong
project_dir: /opt/phuong
compose_file: "{{ project_dir }}/docker-compose.yml"
env_file: "{{ project_dir }}/.env"

# Domain settings (set DOMAIN env var to enable public agent API on 80/443)
domain: "{{ lookup('env', 'DOMAIN') | default('', true) }}"

# Docker settings
docker_version: "24.0"
docker_compose_version: "2.23.0"

# OpenClaw data directory
openclaw_data_path: /root/.openclaw

# Nginx settings
nginx_user: www-data
nginx_worker_processes: auto
nginx_worker_connections: 1024

# SSL (auto-enabled when domain is set)
ssl_enabled: "{{ domain | length > 0 }}"
ssl_cert_path: /etc/letsencrypt/live/{{ domain }}
